name: Build & Test

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta]
        exclude:
          - os: windows-latest
            rust: beta
          - os: macos-latest
            rust: beta

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-
            ${{ runner.os }}-cargo-

      - name: Formatting
        run: cargo fmt --all
        if: matrix.rust == 'stable'

      - name: Check formatting
        run: cargo fmt --all -- --check
        if: matrix.rust == 'stable'

      - name: Clippy Fix all
        run: cargo clippy --fix --all-features --allow-dirty
        if: matrix.rust == 'stable'
      
      - name: Lint with clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        if: matrix.rust == 'stable'

      - name: Build (debug)
        run: cargo build --all-features

      - name: Build (release)
        run: cargo build --release --all-features

      - name: Run tests
        run: cargo test --all-features

      - name: Upload binary artifact (Ubuntu stable)
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: readmetoo-linux-x86_64
          path: target/release/readmetoo
          if-no-files-found: error

      - name: Upload binary artifact (macOS stable)
        if: matrix.os == 'macos-latest' && matrix.rust == 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: readmetoo-macos-x86_64
          path: target/release/readmetoo
          if-no-files-found: error

      - name: Upload binary artifact (Windows stable)
        if: matrix.os == 'windows-latest' && matrix.rust == 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: readmetoo-windows-x86_64
          path: target/release/readmetoo.exe
          if-no-files-found: error
